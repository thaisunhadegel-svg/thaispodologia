<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Podologia</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
h2 {
    margin-top: 20px;
}
input, textarea, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 10px;
}
button {
    background: #2d89ef;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}
.card {
    background: #eef3f7;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

<h1>📅 Agendamento + Anamnese Podologia</h1>

<h2>Dados do Paciente</h2>
<input id="nome" placeholder="Nome">
<input id="contato" placeholder="Contato">
<input id="idade" placeholder="Idade">

<h2>Agendamento</h2>
<input type="date" id="data">
<input type="time" id="hora">

<h2>Anamnese</h2>

<textarea id="queixa" placeholder="Queixa principal"></textarea>
<textarea id="tratamento" placeholder="Tratamento anterior"></textarea>

<select id="calcado">
<option>Aberto</option>
<option>Fechado</option>
</select>

<input id="numero" placeholder="Número do calçado">

<select id="meia">
<option>Não usa</option>
<option>Esportiva</option>
<option>Social</option>
</select>

<input id="peso" placeholder="Peso">
<input id="altura" placeholder="Altura">

<input id="esporte" placeholder="Pratica esportes?">

<input id="cirurgia" placeholder="Cirurgias anteriores">

<select id="dor">
<option>Nenhuma</option>
<option>Pouca</option>
<option>Suportável</option>
<option>Muita</option>
</select>

<input id="agua" placeholder="Ingestão de água">

<h3>Condições de saúde</h3>
<label><input type="checkbox" id="diabetes"> Diabetes</label><br>
<label><input type="checkbox" id="pressao"> Pressão alta</label><br>
<label><input type="checkbox" id="circulatorio"> Problema circulatório</label><br>
<input id="outras" placeholder="Outras condições">

<input id="alergia" placeholder="Alergias">

<select id="fotos">
<option>Sim</option>
<option>Não</option>
</select>

<h2>Anotações</h2>
<textarea id="anotacoes"></textarea>

<button onclick="salvar()">Salvar Paciente</button>

<h2>Pacientes cadastrados</h2>
<div id="lista"></div>

</div>

<script>

let pacientes = JSON.parse(localStorage.getItem("pacientes")) || [];

function salvar() {

    let paciente = {
        nome: nome.value,
        contato: contato.value,
        idade: idade.value,
        data: data.value,
        hora: hora.value,
        queixa: queixa.value,
        tratamento: tratamento.value,
        calcado: calcado.value,
        numero: numero.value,
        meia: meia.value,
        peso: peso.value,
        altura: altura.value,
        esporte: esporte.value,
        cirurgia: cirurgia.value,
        dor: dor.value,
        agua: agua.value,
        diabetes: diabetes.checked,
        pressao: pressao.checked,
        circulatorio: circulatorio.checked,
        outras: outras.value,
        alergia: alergia.value,
        fotos: fotos.value,
        anotacoes: anotacoes.value
    };

    pacientes.push(paciente);
    localStorage.setItem("pacientes", JSON.stringify(pacientes));

    alert("Salvo com sucesso!");
    mostrar();
}

function mostrar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    pacientes.forEach((p, i) => {
        lista.innerHTML += `
        <div class="card">
            <b>${p.nome}</b><br>
            📅 ${p.data} às ${p.hora}<br>
            📞 ${p.contato}<br>
            Queixa: ${p.queixa}<br>
            Anotações: ${p.anotacoes}
        </div>
        `;
    });
}

mostrar();

</script>

</body>
</html>
